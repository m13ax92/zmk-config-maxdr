# Globale ZMK-Optionen fuer beide Haelften.

# Akkustand per Bluetooth an den PC melden (Choc/nice!nano)
CONFIG_ZMK_BATTERY_REPORTING=y

# Tiefschlaf nach Inaktivitaet -> Akku haelt laenger.
CONFIG_ZMK_SLEEP=y
# Nach 30 min Inaktivitaet schlafen (Wert in ms).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Optional: USB-Logging zum Debuggen (auskommentiert lassen im Normalbetrieb,
# kostet Strom). Bei Bedarf einkommentieren:
# CONFIG_ZMK_USB_LOGGING=y
